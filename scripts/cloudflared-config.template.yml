# Cloudflare Tunnel — Agent Peer Bridge (Host)
#
# 1. cloudflared tunnel create peer-bridge
# 2. cloudflared tunnel route dns peer-bridge peer-setup.YOUR_DOMAIN
# 3. cloudflared tunnel route dns peer-bridge peer-api.YOUR_DOMAIN
# 4. cp credentials to .cloudflared/ and set paths below
# 5. Set in .env:
#      PEER_PUBLIC_SETUP_URL=https://peer-setup.YOUR_DOMAIN
#      PEER_PUBLIC_PEER_URL=https://peer-api.YOUR_DOMAIN
# 6. make peer-start && make peer-tunnel-start
#
# Optional: Cloudflare Zero Trust → Access → protect both hostnames (recommended).

tunnel: peer-bridge
credentials-file: .cloudflared/peer-bridge.json

ingress:
  - hostname: peer-setup.YOUR_DOMAIN
    service: http://127.0.0.1:3848
  - hostname: peer-api.YOUR_DOMAIN
    service: http://127.0.0.1:3847
  - service: http_status:404
